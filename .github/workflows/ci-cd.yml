name: Deploy Django App

on: [push, pull_request]

env:
  DOCKER_IMAGE: oksananik/varnitsa-app
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.0
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      env:
        SECRET_KEY: test-secret-key
        DEBUG: True
        POSTGRES_DB: test_db
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_password
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      run: |
        python manage.py test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        docker build -t $DOCKER_IMAGE:latest .
        docker build -t $DOCKER_IMAGE:latest-nginx -f nginx-Dockerfile .

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker images
      run: |
        docker tag $DOCKER_IMAGE:latest ${{ env.REGISTRY }}/$DOCKER_IMAGE:latest
        docker tag $DOCKER_IMAGE:latest-nginx ${{ env.REGISTRY }}/$DOCKER_IMAGE:latest-nginx
        docker push ${{ env.REGISTRY }}/$DOCKER_IMAGE:latest
        docker push ${{ env.REGISTRY }}/$DOCKER_IMAGE:latest-nginx

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /path/to/your/app
          
          # Pull latest images
          docker-compose pull
          
          # Backup database
          docker-compose exec -T db pg_dump -U $POSTGRES_USER $POSTGRES_DB > backup_$(date +%Y%m%d_%H%M%S).sql
          
          # Stop and recreate containers
          docker-compose down
          docker-compose up -d
          
          # Run migrations
          docker-compose exec -T web python manage.py migrate
          
          # Collect static files
          docker-compose exec -T web python manage.py collectstatic --noinput
          
          # Restart application
          docker-compose restart web

  database-migration:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4

    - name: Migrate data from local to production
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # Этот шаг нужно адаптировать под ваш процесс миграции данных
          # Пример: загрузка дампа данных с локальной БД
          # scp local-backup.sql user@server:/tmp/
          # docker-compose exec -T db psql -U $POSTGRES_USER -d $POSTGRES_DB -f /tmp/local-backup.sql
          echo "Database migration would happen here"