name: Deploy Django App

on: [push, pull_request]

env:
  DOCKER_IMAGE: oksananiklashkova/varnitsa-web
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
    services:
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: Run tests
        run: python manage.py test


  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest-nginx
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install and configure Docker on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Проверяем доступность нового синтаксиса docker compose
            if command -v docker compose &> /dev/null; then
              echo "Using new docker compose syntax"
              DOCKER_COMPOSE_CMD="docker compose"
            elif command -v docker-compose &> /dev/null; then
              echo "Using old docker-compose syntax"
              DOCKER_COMPOSE_CMD="docker-compose"
            else
              echo "Installing Docker Compose..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              DOCKER_COMPOSE_CMD="docker-compose"
            fi
            $DOCKER_COMPOSE_CMD --version

      - name: Create app directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/varnitsa_app
            mkdir -p ~/varnitsa_app/data/certbot/conf
            mkdir -p ~/varnitsa_app/data/certbot/www
            mkdir -p ~/varnitsa_app/nginx

      - name: Copy project files to server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,init.sql"
          target: "~/varnitsa_app/"

      - name: Create env file on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/varnitsa_app
            cat > .env << EOF
            DOMAIN=${{ secrets.DOMAIN || '_' }}
            CERTBOT_EMAIL=${{ secrets.CERTBOT_EMAIL }}
            SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=${{ secrets.POSTGRES_HOST || 'db' }}
            EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT || '465' }}
            EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS || 'False' }}
            EMAIL_USE_SSL=${{ secrets.EMAIL_USE_SSL || 'True' }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            WEB_IMAGE=${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
            NGINX_IMAGE=${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest-nginx
            EOF

      - name: Copy nginx configuration
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "nginx/*"
          target: "~/varnitsa_app/nginx/"

      - name: Login to container registry on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Deploy application with new syntax
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/varnitsa_app

            # Останавливаем и удаляем старые контейнеры
            docker compose down

            # Пул последних образов
            docker compose pull

            # Запускаем только базу данных и redis сначала
            docker compose up -d db redis

            # Ждем пока база данных станет здоровой
            echo "Waiting for database to be ready..."
            sleep 30
            
            # Устанавливаем необходимое расширение
            docker compose exec db psql -U postgres -d varnitsa -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

            # Проверяем статус базы данных
            docker compose ps

            # Запускаем веб-приложение отдельно
            docker compose up -d web

            # Ждем пока веб-приложение запустится
            echo "Waiting for web application to start..."
            sleep 30

            # Проверяем статус веб-приложения
            docker compose ps web

            # Смотрим логи веб-приложения для диагностики
            echo "=== Web container logs ==="
            docker compose logs web --tail=20

            # Если веб-приложение работает, запускаем остальные сервисы
            docker compose up -d

            # Ждем пока все сервисы запустятся
            echo "Waiting for all services to start..."
            sleep 30

            # Проверяем статус всех сервисов
            docker compose ps

            # Запускаем миграции БД
            docker compose exec -T web python manage.py migrate

            # Собираем статику
            docker compose exec -T web python manage.py collectstatic --noinput

            # Загружаем фикстуры
            docker compose exec -T web python manage.py loaddata fixtures/users.json
            docker compose exec -T web python manage.py loaddata fixtures/product_categories.json
            docker compose exec -T web python manage.py loaddata fixtures/products.json
            docker compose exec -T web python manage.py loaddata fixtures/publications.json
            docker compose exec -T web python manage.py loaddata fixtures/publication_photos.json

            # Перезапускаем веб-приложение
            docker compose restart web

            if [[ "$DOMAIN" == *.* ]] && [ "$DOMAIN" != "localhost" ] && [ "$DOMAIN" != "_" ] && [ -n "$DOMAIN" ]; then
                echo "Running certbot for domain: $DOMAIN"
                docker compose run --rm certbot certonly --webroot -w /var/www/certbot --force-renewal --email your-email@domain.com -d $DOMAIN -d www.$DOMAIN --agree-tos
            else
                echo "Domain not set or invalid ($DOMAIN), skipping SSL certificate generation"
            fi

      - name: Check application status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/varnitsa_app
            echo "=== Docker Compose Status ==="
            docker compose ps
            echo "=== Recent Logs ==="
            docker compose logs --tail=20

      - name: Cleanup old images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker image prune -f