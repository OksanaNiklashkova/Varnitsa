name: Deploy Django App

on: [push, pull_request]

env:
  DOCKER_IMAGE: oksananiklashkova/varnitsa-web
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
    services:
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: Run tests
        run: python manage.py test


  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest-nginx
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure Docker permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Добавляем пользователя в группу docker (если еще не добавлен)
            sudo usermod -aG docker $USER 2>/dev/null || true

      - name: Install Docker Compose on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Устанавливаем Docker (если не установлен)
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker $USER
            fi
            
            # Устанавливаем Docker Compose (если не установлен)
            if ! command -v docker-compose &> /dev/null && ! command -v docker compose &> /dev/null; then
              echo "Installing Docker Compose..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              # Создаем симлинк для совместимости
              sudo ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose
            fi
            
            # Проверяем установку
            docker --version
            docker-compose --version || docker compose version

      - name: Create app directory and copy files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Создаем папку приложения
            mkdir -p ~/varnitsa_app
            cd ~/varnitsa_app
            
            # Копируем docker-compose.yml с GitHub
            curl -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.yml
            
            # Создаем необходимые папки для nginx и certbot
            mkdir -p nginx
            mkdir -p data/certbot/conf
            mkdir -p data/certbot/www


      - name: Create env file on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/varnitsa_app
            cat > .env << EOF
            DOMAIN=${{ secrets.DOMAIN || '_' }}
            CERTBOT_EMAIL=${{ secrets.CERTBOT_EMAIL }}
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=${{ secrets.POSTGRES_HOST || 'db' }}
            EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT || '465' }}
            EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS || 'False' }}
            EMAIL_USE_SSL=${{ secrets.EMAIL_USE_SSL || 'True' }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            # Добавьте эти переменные для образов
            WEB_IMAGE=${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
            NGINX_IMAGE=${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest-nginx
            EOF

      - name: Copy nginx configuration
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "nginx/*"
          target: "~/varnitsa_app/nginx/"

      - name: Login to container registry on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Test Docker and Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Проверяем, что Docker и Docker Compose работают
            echo "Testing Docker..."
            docker --version
            echo "Testing Docker Compose..."
            docker-compose --version || docker compose version
            echo "Testing Docker commands..."
            docker ps

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/varnitsa_app
            # Проверяем, что файлы на месте
            ls -la
            ls -la nginx/
            
            # Пул последних образов
            docker compose pull
            
            # Создаем бэкап базы данных
            docker compose exec -T db pg_dump -U ${{ secrets.POSTGRES_USER }} ${{ secrets.POSTGRES_DB }} > backup_$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || echo "Backup skipped - database might not be running"
            
            # Остановка и пересборка контейнеров
            docker compose down
            docker compose up -d
            
            # Ждем, пока сервисы будут готовы к работе
            sleep 50
            
            # Запускаем миграции БД
            docker compose exec -T web python manage.py migrate
            
            # Собираем статику
            docker compose exec -T web python manage.py collectstatic --noinput
            
            # Загружаем в БД объекты из фикстур.
            docker compose exec -T web python manage.py loaddata fixtures/users.json
            docker compose exec -T web python manage.py loaddata fixtures/product_categories.json
            docker compose exec -T web python manage.py loaddata fixtures/products.json
            docker compose exec -T web python manage.py loaddata fixtures/publications.json
            docker compose exec -T web python manage.py loaddata fixtures/publication_photos.json
            
            # Перезапуск приложения
            docker compose restart web
            
            # Запуск certbot, если есть доменное имя
            if [ "${{ secrets.DOMAIN }}" != "_" ] && [ -n "${{ secrets.DOMAIN }}" ]; then
              docker compose run --rm certbot
            fi

      - name: Cleanup old images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker image prune -f