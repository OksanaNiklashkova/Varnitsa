{% load static %}
<div class="header-with-wave" style="background: rgba(62, 39, 35); border: 1px solid #8D6E63; position: fixed; top: 0; width: 100%; z-index: 1000;">
    <div class="mx-auto" style="width: 66.66%;">
        <div class="pricing-header px-3 py-2">
            <div class="d-flex align-items-center justify-content-between my-2 ps-4">
                <div class="logo me-4">
                    <img width="220" height="140" src="{% static 'images/catalog/logo_Varnitsa.png' %}" alt="Логотип Варница"
                         class="img-fluid">
                </div>
                <div class="text-start flex-grow-1">
                    <h1 class="display-1 fw-bold text-white"
                        style="font-family: 'Cormorant Garamond', serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 0.5rem; line-height: 1.1; font-size: clamp(3rem, 8vw, 5rem);">
                        Варница</h1>
                    <p class="lead mb-0 fs-5 text-white"
                       style="font-family: 'Raleway', sans-serif; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
                        Пиво и безалкогольные напитки высокого качества от производителя
                    </p>
                </div>

            <div class="d-flex justify-content-end align-items-center gap-2 py-1 px-3 rounded"></div>

            </div>

            <nav class="nav nav-pills nav-justified align-items-center" style="margin: 10px; gap: 10px;">
                <a class="custom-menu-btn" href="{% url 'catalog:home' %}">Главная</a>
                <a class="custom-menu-btn" href="{% url 'blog:info_list' %}">О заводе</a>

                <div class="dropdown d-flex flex-fill">
                    <a class="custom-menu-btn dropdown-toggle"
                       data-bs-toggle="dropdown" href="{% url 'catalog:products' %}" role="button">
                        Каталог
                    </a>
                    <ul class="dropdown-menu w-100">
                        <li><a class="dropdown-item text-center" href="{% url 'catalog:products' %}">Все категории</a></li>
                        <li><a class="dropdown-item text-center" href="{% url 'catalog:category_products' 1 %}">Разливные напитки</a></li>
                        <li><a class="dropdown-item text-center" href="{% url 'catalog:category_products' 2 %}">Фасованные напитки</a></li>
                        <li><a class="dropdown-item text-center" href="{% url 'catalog:category_products' 3 %}">Безалкогольное пиво</a></li>
                        <li><a class="dropdown-item text-center" href="{% url 'catalog:category_products' 4 %}">Квас, лимонад</a></li>
                    </ul>
                </div>

                <a class="custom-menu-btn"
                   href="{% url 'blog:publication_list' %}">Блог</a>
                <a class="custom-menu-btn"
                   href="{% url 'contacts:page' %}">Контакты</a>
            </nav>
        </div>
    </div>
</div>
