{% if is_paginated %}
<div class="d-flex justify-content-between align-items-center mt-4 p-3"
     style="background: rgba(165, 42, 42, 0.1); border-radius: 10px; border: 1px solid #A52A2A;">

    <div>
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}"
               class="btn btn-sm"
               style="background: #A52A2A; color: white;">
                ← Назад
            </a>
        {% endif %}
    </div>

    <div class="text-center" style="color: #A52A2A;">
        <strong>Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</strong>
    </div>

    <div>
        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}"
               class="btn btn-sm"
               style="background: #A52A2A; color: white;">
                Вперед →
            </a>
        {% endif %}
    </div>
</div>
{% endif %}
